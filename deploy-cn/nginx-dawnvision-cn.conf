# DawnVision 国内服务器 Nginx 配置
# 静态文件模式 - 直接serve本地文件，不反向代理
# 基于现有certbot证书配置，保留SSL和HTTP跳转

# HTTP -> HTTPS 跳转
server {
    listen 80;
    server_name dawnvision.cn www.dawnvision.cn;
    return 301 https://$host$request_uri;
}

# HTTPS 静态站点
server {
    listen 443 ssl;
    server_name dawnvision.cn www.dawnvision.cn;

    # SSL 证书（certbot 管理）
    ssl_certificate /etc/letsencrypt/live/dawnvision.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dawnvision.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 日志
    access_log /var/log/nginx/dawnvision_access.log;
    error_log /var/log/nginx/dawnvision_error.log;

    # 网站根目录
    root /var/www/dawnvision;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/rss+xml
        image/svg+xml
        font/woff2
        font/ttf
        font/otf;

    # 静态资源长期缓存（JS/CSS/图片/字体，带hash的文件）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML 不缓存（保证内容更新及时）
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Astro 目录式路由: /articles/xxx/ -> /articles/xxx/index.html
    location / {
        try_files $uri $uri/ $uri/index.html /404.html;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
