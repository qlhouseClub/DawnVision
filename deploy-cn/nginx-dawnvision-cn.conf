# DawnVision 国内服务器 Nginx 配置
# 当前阶段: 备案进行中，HTTP模式，支持IP直连
# 备案通过后: 可切换到HTTPS（见下方注释）

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name dawnvision.cn www.dawnvision.cn 110.42.236.22 _;

    # 日志
    access_log /var/log/nginx/dawnvision_access.log;
    error_log /var/log/nginx/dawnvision_error.log;

    # 网站根目录
    root /var/www/dawnvision;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/rss+xml
        image/svg+xml
        font/woff2
        font/ttf
        font/otf;

    # 静态资源长期缓存（JS/CSS/图片/字体，带hash的文件）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML 不缓存（保证内容更新及时）
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Astro 目录式路由: /articles/xxx/ -> /articles/xxx/index.html
    location / {
        try_files $uri $uri/ $uri/index.html /404.html;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

