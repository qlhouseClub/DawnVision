<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      .bg { fill: #002FA7; }
      .eyebrow {
        font-family: 'Source Serif 4', 'Noto Serif SC', Georgia, 'Times New Roman', serif;
        font-size: 22px;
        font-weight: 700;
        fill: #ffffff;
        letter-spacing: 12px;
        text-transform: uppercase;
      }
      .headline {
        font-family: 'Source Serif 4', 'Noto Serif SC', Georgia, 'Times New Roman', serif;
        font-size: 108px;
        font-weight: 900;
        fill: #ffffff;
        letter-spacing: -1px;
      }
      .deck {
        font-family: 'Source Serif 4', 'Noto Serif SC', Georgia, 'Times New Roman', serif;
        font-size: 30px;
        font-weight: 400;
        fill: #ffffff;
        letter-spacing: 2px;
      }
      .footer-line {
        font-family: 'Source Serif 4', 'Noto Serif SC', Georgia, 'Times New Roman', serif;
        font-size: 20px;
        font-weight: 400;
        fill: rgba(255,255,255,0.65);
        letter-spacing: 3px;
      }
      .rule {
        stroke: rgba(255,255,255,0.25);
        stroke-width: 1;
      }
      .rule-thick {
        stroke: rgba(255,255,255,0.5);
        stroke-width: 2;
      }
    </style>
  </defs>

  <!-- Klein Blue background -->
  <rect class="bg" width="1200" height="630"/>

  <!-- Top thin rule -->
  <line class="rule" x1="80" y1="62" x2="1120" y2="62"/>

  <!-- Top-left eyebrow: DAWN VISION -->
  <text class="eyebrow" x="80" y="108">DAWN VISION</text>

  <!-- Top-right eyebrow: Daily Briefing -->
  <text class="eyebrow" x="1120" y="108" text-anchor="end" style="font-size:18px; letter-spacing:8px; font-weight:400; opacity:0.7;">DAILY BRIEFING</text>

  <!-- Center content group -->
  <g transform="translate(80, 0)">
    <!-- Main headline: Dawn Vision -->
    <text class="headline" x="0" y="320">Dawn Vision</text>

    <!-- Deck line -->
    <text class="deck" x="2" y="380">Daily Briefing · 穿越嘈杂，洞见留声</text>

    <!-- Decorative rule under deck -->
    <line class="rule-thick" x1="0" y1="410" x2="120" y2="410"/>
  </g>

  <!-- Bottom section -->
  <g transform="translate(0, 560)">
    <!-- Bottom rule -->
    <line class="rule" x1="80" y1="0" x2="1120" y2="0"/>

    <!-- Bottom-left: frequency -->
    <text class="footer-line" x="80" y="38">AI 深度观察日刊 · 每个工作日</text>

    <!-- Bottom-right: URL / tag -->
    <text class="footer-line" x="1120" y="38" text-anchor="end" style="letter-spacing:2px;">qlhouseclub.github.io/DawnVision</text>
  </g>
</svg>
