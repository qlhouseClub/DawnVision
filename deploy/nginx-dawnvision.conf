server {
    listen 80;
    server_name dawnvision.cn www.dawnvision.cn;

    # Redirect all HTTP to HTTPS (will be enabled after SSL cert is obtained)
    # return 301 https://$server_name$request_uri;

    root /var/www/dawnvision;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Static assets cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Astro directory-based routing: try file, then directory with index.html
    location / {
        try_files $uri $uri/ $uri/index.html /404.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

