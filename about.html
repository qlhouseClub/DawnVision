<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About · Dawn Vision</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;0,8..60,900;1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23002FA7' width='100' height='100'/><text y='75' font-size='80' fill='white' font-family='serif'>D</text></svg>">
  <style>
    .about-compact {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: clamp(24px, 4vw, 40px) clamp(24px, 5vw, 64px);
      max-width: 520px;
      margin: 0 auto;
    }
    .about-compact__name {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--ink);
      margin-bottom: 6px;
      line-height: 1;
    }
    .about-compact__subtitle {
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--klein);
      font-family: var(--serif-display);
      font-weight: 700;
      margin-bottom: 28px;
    }
    .about-compact__bio {
      list-style: none;
      padding: 0;
      margin: 0 0 28px 0;
      font-size: clamp(0.9rem, 1.3vw, 1rem);
      color: var(--gray-mid);
      line-height: 2;
      font-family: var(--sans);
      font-style: italic;
      text-align: center;
    }
    .about-compact__bio li { margin: 0; padding: 0; }
    .about-compact__divider {
      width: 32px;
      height: 2px;
      background: var(--klein);
      margin: 0 auto 24px;
    }
    /* Contact - stacked layout, two columns */
    .about-contact {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
      max-width: 400px;
      width: 100%;
    }
    .about-contact__item {
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: opacity 0.2s;
    }
    .about-contact__item:hover { opacity: 0.6; }
    .about-contact__value {
      font-size: 0.95rem;
      font-family: var(--serif-display);
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .about-contact__label {
      font-size: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--klein);
      font-family: var(--serif-display);
      font-weight: 700;
    }
    /* Reward QR - no border, larger */
    .about-reward {
      text-align: center;
    }
    .about-reward__label {
      font-size: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--klein);
      font-family: var(--serif-display);
      font-weight: 700;
      margin-bottom: 10px;
    }
    .about-reward__img {
      width: 135px;
      height: 135px;
      object-fit: contain;
      display: block;
      margin: 0 auto 6px;
    }
    .about-reward__text {
      font-size: 0.75rem;
      color: var(--gray-light);
      font-style: italic;
      font-family: var(--sans);
      margin: 0;
    }
  </style>
</head>
<body>

  <!-- Inner nav -->
  <nav class="inner-nav">
    <div class="inner-nav__inner">
      <div class="inner-nav__group">
        <a href="index.html" class="inner-nav__link">Home</a>
        <a href="articles.html" class="inner-nav__link">Articles</a>
      </div>
      <a href="index.html" class="inner-nav__brand">
        Dawn Vision
        <small>Daily Briefing</small>
      </a>
      <div class="inner-nav__group">
        <a href="cao.html" class="inner-nav__link">Cao</a>
        <a href="about.html" class="inner-nav__link inner-nav__link--active">About</a>
      </div>
    </div>
  </nav>

  <!-- Centered compact content - fits one screen -->
  <div class="about-compact">
    <h1 class="about-compact__name">Dawn Vision</h1>
    <div class="about-compact__subtitle">About the Author</div>

    <ul class="about-compact__bio">
      <li>水瓶座、天马行空的设计师</li>
      <li>INFP (MBTI)、MUM (SBTI)</li>
      <li>认错超快叛逆不改气人天赋高超的心理砖家</li>
      <li>视角独特且薄学的不才写手</li>
      <li>仗势AI冲浪的技术小白</li>
    </ul>

    <div class="about-compact__divider"></div>

    <div class="about-contact">
      <div class="about-contact__item">
        <div class="about-contact__value">DawnVision88</div>
        <div class="about-contact__label">WeChat</div>
      </div>
      <a href="tel:18622454349" class="about-contact__item">
        <div class="about-contact__value">18622454349</div>
        <div class="about-contact__label">Phone</div>
      </a>
    </div>

    <div class="about-reward">
      <div class="about-reward__label">Tip Jar</div>
      <img src="assets/reward-qr.webp" alt="谢谢老板请我喝奶茶" class="about-reward__img">
      <p class="about-reward__text">"谢谢老板请我喝奶茶"</p>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <div class="site-footer__brand">Dawn Vision</div>
      <div class="site-footer__meta">© 2026 · Daily at 16:30 CST · Weekdays Only</div>
    </div>
  </footer>

</body>
</html>
