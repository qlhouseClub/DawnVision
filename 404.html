/* ===== GT BANNER SUPPRESSION (runs before any other script) ===== */
(function(){
  /* 1. Inject CSS that hides all GT chrome before any GT element exists */
  var _s=document.createElement('style');
  _s.textContent='.goog-te-banner-frame,.goog-te-gadget,.goog-te-gadget-icon,.goog-te-gadget-simple,.goog-te-spinner-pos,.goog-te-spinner,.goog-te-menu-frame,.goog-te-balloon-frame,.goog-tooltip,#goog-gt-tt{display:none!important;visibility:hidden!important;height:0!important;width:0!important;opacity:0!important;pointer-events:none!important;position:absolute!important;top:-9999px!important;left:-9999px!important;}body,html{top:0!important;margin-top:0!important;}';
  (document.head||document.getElementsByTagName('head')[0]).appendChild(_s);

  /* 2. Function to check if a node is a GT banner element */
  function isGTBanner(n){
    if(!n||n.nodeType!==1)return false;
    var t=n.tagName;
    var c=(n.className&&typeof n.className==='string')?n.className:'';
    var i=(n.id&&typeof n.id==='string')?n.id:'';
    var a=(n.getAttribute&&n.getAttribute('src'))||'';
    if(t==='IFRAME'&&(/goog-te-banner/.test(c)||/goog-te-banner/.test(i)||/translate\.google\.com\/translate/.test(a))){
      /* Allow if inside our hidden container */
      var p=n.parentNode;
      while(p){if(p.id==='google_translate_element')return false;p=p.parentNode;}
      return true;
    }
    if(t==='DIV'&&(/goog-te-spinner/.test(c)||/goog-te-banner/.test(c)||/goog-te-balloon/.test(c)))return true;
    if(i==='goog-gt-tt')return true;
    return false;
  }

  /* 3. Patch appendChild/insertBefore on Node.prototype to intercept GT */
  var _ac=Node.prototype.appendChild;
  var _ib=Node.prototype.insertBefore;
  function wrapInsert(orig){
    return function(node){
      if(isGTBanner(node)){
        /* Silently swallow the insertion */
        try{node.style.cssText+='display:none!important;height:0!important;width:0!important;position:absolute!important;top:-9999px!important;';}catch(e){}
        return node;
      }
      return orig.apply(this,arguments);
    };
  }
  Node.prototype.appendChild=wrapInsert(_ac);
  Node.prototype.insertBefore=wrapInsert(_ib);

  /* 4. Continuous cleanup every 50ms */
  function killGT(){
    if(!document.body)return;
    var fc=document.body.firstChild;
    while(fc){
      var next=fc.nextSibling;
      if(fc.nodeType===1&&isGTBanner(fc)&&fc.parentNode){
        fc.parentNode.removeChild(fc);
      }
      fc=next;
    }
    /* Also check all iframes */
    var ifs=document.querySelectorAll('iframe.goog-te-banner-frame');
    for(var i=0;i<ifs.length;i++){
      var inContainer=false;var p=ifs[i].parentNode;
      while(p){if(p.id==='google_translate_element'){inContainer=true;break;}p=p.parentNode;}
      if(!inContainer&&ifs[i].parentNode)ifs[i].parentNode.removeChild(ifs[i]);
    }
    /* Reset body styles */
    document.body.style.top='0';
    document.body.style.marginTop='0';
    if(document.documentElement){document.documentElement.style.top='0';document.documentElement.style.marginTop='0';}
  }
  setInterval(killGT,50);

  /* 5. MutationObserver for instant removal */
  function startObserver(){
    if(!document.body)return;
    if(window.__dvGTObs)return;
    var obs=new MutationObserver(function(muts){
      var needKill=false;
      for(var i=0;i<muts.length;i++){
        var m=muts[i];
        if(m.addedNodes){
          for(var j=0;j<m.addedNodes.length;j++){
            if(isGTBanner(m.addedNodes[j])){needKill=true;break;}
          }
        }
        if(m.type==='attributes'&&(m.attributeName==='style'||m.attributeName==='class'))needKill=true;
        if(needKill)break;
      }
      if(needKill){requestAnimationFrame(killGT);setTimeout(killGT,16);setTimeout(killGT,100);}
    });
    obs.observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['style','class']});
    obs.observe(document.documentElement,{childList:true,attributes:true,attributeFilter:['style','class']});
    window.__dvGTObs=obs;
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',startObserver);
  }else{startObserver();}
  /* Also try to start early */
  var _iv=setInterval(function(){if(document.body){startObserver();clearInterval(_iv);}},5);
})();
</script>
